name: update-ranges

on:
  workflow_dispatch:
    inputs:
      max_players:
        description: "Max jugadores a revisar. Usa 0 para todos."
        required: false
        default: "0"
      delay_ms:
        description: "Pausa entre jugadores en milisegundos."
        required: false
        default: "1300"

permissions:
  contents: write

concurrency:
  group: futgg-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 900

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm.cmd ci

      - name: Install Playwright Chromium
        run: npx.cmd playwright install chromium

      - name: Update FUT.GG ranges and prices
        env:
          MAX_RANGE_PLAYERS: ${{ inputs.max_players }}
          RANGE_DELAY_MS: ${{ inputs.delay_ms }}
        run: npm.cmd run update:ranges

      - name: Commit updated data
        if: always()
        run: |
          git diff --quiet data
          if %ERRORLEVEL% EQU 0 (
            echo No data changes.
            exit /b 0
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/players.json data/metadata.json
          git commit -m "Update FUT.GG ranges"
          git push origin HEAD:gh-pages
