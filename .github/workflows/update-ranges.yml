jobs:
  update:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: powershell
        run: npm.cmd ci

      - name: Install Playwright Chromium
        shell: powershell
        run: npx.cmd playwright install chromium

      - name: Update FUT.GG ranges and prices
        shell: powershell
        env:
          MAX_RANGE_PLAYERS: ${{ inputs.max_players }}
          RANGE_DELAY_MS: ${{ inputs.delay_ms }}
        run: npm.cmd run update:ranges
